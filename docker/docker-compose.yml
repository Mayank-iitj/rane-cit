# cnc-mayyanks — Docker Compose (Production)
# Domain: cnc.mayyanks.app

services:
  # ═══════════════════════════════════════════════════
  # Infrastructure Services
  # ═══════════════════════════════════════════════════

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: cnc-mayyanks-postgres
    environment:
      POSTGRES_USER: cnc_mayyanks
      POSTGRES_PASSWORD: cnc_secret
      POSTGRES_DB: cnc_mayyanks_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cnc_mayyanks"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cnc-mayyanks-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: cnc-mayyanks-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: cnc-mayyanks-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    restart: unless-stopped

  mqtt:
    image: eclipse-mosquitto:2
    container_name: cnc-mayyanks-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mqttdata:/mosquitto/data
    restart: unless-stopped

  # ═══════════════════════════════════════════════════
  # Application Services — cnc-mayyanks-*
  # ═══════════════════════════════════════════════════

  cnc-mayyanks-api:
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: cnc-mayyanks-api
    environment:
      - APP_NAME=cnc-mayyanks-api
      - APP_DOMAIN=cnc.mayyanks.app
      - DATABASE_URL=postgresql+asyncpg://cnc_mayyanks:cnc_secret@postgres:5432/cnc_mayyanks_db
      - REDIS_URL=redis://redis:6379/0
      - KAFKA_BROKERS=kafka:9092
      - MQTT_BROKER=mqtt
      - ML_SERVICE_URL=http://cnc-mayyanks-ml-service:8001
      - REALTIME_SERVICE_URL=http://cnc-mayyanks-realtime:8002
      - INGESTION_SERVICE_URL=http://cnc-mayyanks-ingestion:8003
      - SECRET_KEY=cnc-mayyanks-production-secret-change-me
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-https://cnc.mayyanks.app/api/auth/google/callback}
      - ENABLE_SIMULATOR=true
      - DEBUG=false
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  cnc-mayyanks-ml-service:
    build:
      context: ../ml-service
      dockerfile: Dockerfile
    container_name: cnc-mayyanks-ml-service
    ports:
      - "8001:8001"
    restart: unless-stopped

  cnc-mayyanks-realtime:
    build:
      context: ../realtime
      dockerfile: Dockerfile
    container_name: cnc-mayyanks-realtime
    ports:
      - "8002:8002"
    restart: unless-stopped

  cnc-mayyanks-ingestion:
    build:
      context: ../ingestion
      dockerfile: Dockerfile
    container_name: cnc-mayyanks-ingestion
    environment:
      - KAFKA_BROKERS=kafka:9092
      - API_URL=http://cnc-mayyanks-api:8000
      - REALTIME_URL=http://cnc-mayyanks-realtime:8002
    ports:
      - "8003:8003"
    depends_on:
      - kafka
      - cnc-mayyanks-api
    restart: unless-stopped

  cnc-mayyanks-frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: cnc-mayyanks-frontend
    environment:
      - NEXT_PUBLIC_API_URL=https://cnc.mayyanks.app/api
      - NEXT_PUBLIC_WS_URL=wss://cnc.mayyanks.app/ws
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - NEXT_PUBLIC_APP_NAME=cnc.mayyanks.app
    ports:
      - "3000:3000"
    depends_on:
      - cnc-mayyanks-api
    restart: unless-stopped

  # ═══════════════════════════════════════════════════
  # NGINX Reverse Proxy
  # ═══════════════════════════════════════════════════

  nginx:
    image: nginx:alpine
    container_name: cnc-mayyanks-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../infra/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - cnc-mayyanks-api
      - cnc-mayyanks-frontend
      - cnc-mayyanks-realtime
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  mqttdata:

networks:
  default:
    name: cnc-mayyanks-network