version: '3.8'

services:
  # PostgreSQL with TimescaleDB
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: cnc-postgres
    environment:
      POSTGRES_USER: cnc_user
      POSTGRES_PASSWORD: cnc_password
      POSTGRES_DB: cnc_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cnc_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MQTT Broker
  mqtt:
    image: eclipse-mosquitto:2
    container_name: cnc-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mqttdata:/mosquitto/data
      - mqttlogs:/mosquitto/log
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Backend API
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: cnc-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://cnc_user:cnc_password@postgres:5432/cnc_db
      - MQTT_BROKER=mqtt
      - MQTT_PORT=1883
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mqtt:
        condition: service_healthy
    restart: unless-stopped

  # Frontend Dashboard
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: cnc-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_WS_URL=ws://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  mqttdata:
  mqttlogs:

networks:
  default:
    name: cnc-network