version: '3.9'

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: cnc-mayyanks-postgres-prod
    environment:
      POSTGRES_USER: cnc_mayyanks
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: cnc_mayyanks_db
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cnc_mayyanks"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - cnc_network

  redis:
    image: redis:7-alpine
    container_name: cnc-mayyanks-redis-prod
    command: redis-server --appendonly yes
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - cnc_network

  cnc-mayyanks-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: cnc-mayyanks-api-prod
    environment:
      NODE_ENV: production
      PORT: 8000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: cnc_mayyanks
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: cnc_mayyanks_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ORIGINS: https://cnc.mayyanks.app
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - cnc_network

  cnc-mayyanks-frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: cnc-mayyanks-frontend-prod
    environment:
      NEXT_PUBLIC_API_URL: https://cnc.mayyanks.app/api
      NEXT_PUBLIC_WS_URL: wss://cnc.mayyanks.app/ws
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    depends_on:
      - cnc-mayyanks-api
    restart: unless-stopped
    networks:
      - cnc_network

  nginx:
    image: nginx:alpine
    container_name: cnc-mayyanks-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../infra/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - cnc-mayyanks-api
      - cnc-mayyanks-frontend
    restart: unless-stopped
    networks:
      - cnc_network

volumes:
  postgres_data_prod:
  redis_data_prod:

networks:
  cnc_network:
    driver: bridge
