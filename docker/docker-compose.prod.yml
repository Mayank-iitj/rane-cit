version: '3.9'

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: cnc-postgres
    environment:
      POSTGRES_USER: cnc_user
      POSTGRES_PASSWORD: cnc_password
      POSTGRES_DB: cnc_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cnc_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cnc_network
    restart: unless-stopped

  # TimescaleDB extension (on separate PostgreSQL instance for high-freq telemetry)
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: cnc-timescaledb
    environment:
      POSTGRES_USER: cnc_user
      POSTGRES_PASSWORD: cnc_password
      POSTGRES_DB: cnc_timescale
    volumes:
      - timescale_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cnc_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cnc_network
    restart: unless-stopped

  # Redis cache and session store
  redis:
    image: redis:7-alpine
    container_name: cnc-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ""
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cnc_network
    restart: unless-stopped

  # Zookeeper for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: cnc-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - cnc_network
    restart: unless-stopped

  # Kafka for event streaming
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: cnc-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    networks:
      - cnc_network
    restart: unless-stopped

  # MQTT broker for edge devices
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: cnc-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    networks:
      - cnc_network
    restart: unless-stopped

  # Backend API server
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: cnc-backend
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://cnc_user:cnc_password@postgres:5432/cnc_db
      TIMESCALE_URL: postgresql+asyncpg://cnc_user:cnc_password@timescaledb:5432/cnc_timescale
      REDIS_URL: redis://redis:6379/0
      KAFKA_BROKERS: kafka:29092
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      DEBUG: "False"
      LOG_LEVEL: INFO
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-prod}
      CORS_ORIGINS: "http://localhost:3000,http://localhost:8000,http://frontend:3000,http://127.0.0.1:3000"
      ENABLE_SIMULATOR: "True"
      SIMULATOR_MACHINE_COUNT: "4"
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
      - ../backend/models:/app/models
    networks:
      - cnc_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (Next.js)
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: cnc-frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/.next
      - /app/node_modules
    networks:
      - cnc_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  timescale_data:
    driver: local
  redis_data:
    driver: local
  mosquitto_data:
    driver: local
  mosquitto_logs:
    driver: local

networks:
  cnc_network:
    driver: bridge
