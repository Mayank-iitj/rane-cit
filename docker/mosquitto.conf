# Mosquitto MQTT Broker Configuration

listener 1883
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Connection limits
max_connections -1
max_keepalive 65535

# Message limits
message_size_limit 0
max_queued_messages 1000