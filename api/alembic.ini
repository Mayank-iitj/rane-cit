# cnc-mayyanks-api — Alembic configuration
# Database migration management

[alembic]
script_location = migrations
sqlalchemy.url = postgresql+asyncpg://cnc_mayyanks:cnc_secret@localhost:5432/cnc_mayyanks_db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s [cnc-mayyanks] %(levelname)s %(message)s
